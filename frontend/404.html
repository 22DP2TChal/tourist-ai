<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — AI Tourist</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
      gap: 0;
    }

    .err-globe {
      font-size: 80px;
      line-height: 1;
      margin-bottom: 24px;
      animation: float 3.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-12px); }
    }

    .err-code {
      font-size: clamp(96px, 20vw, 160px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 60%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      user-select: none;
    }

    .err-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .err-sub {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 360px;
      line-height: 1.65;
      margin-bottom: 36px;
    }

    .err-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .err-actions .btn {
      min-width: 140px;
      justify-content: center;
    }

    .err-dots {
      display: flex;
      gap: 6px;
      margin-top: 48px;
    }

    .err-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      animation: blink-dot 1.4s infinite;
    }
    .err-dot:nth-child(2) { animation-delay: 0.2s; }
    .err-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink-dot {
      0%, 80%, 100% { opacity: 0.3; transform: scale(1);    }
      40%           { opacity: 1;   transform: scale(1.4);  }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand"><span>🌍</span> AI Tourist</a>
    <div class="navbar-links" id="nav-auth"></div>
  </nav>

  <div class="page-404">
    <div class="err-globe">🌍</div>
    <div class="err-code">404</div>
    <h1 class="err-title">Page not found</h1>
    <p class="err-sub">
      Looks like this destination doesn't exist on our map.
      Let's get you back on track.
    </p>
    <div class="err-actions">
      <a href="/" class="btn btn-primary">🗺️ Go to Map</a>
      <a href="javascript:history.back()" class="btn btn-ghost">← Go Back</a>
    </div>
    <div class="err-dots">
      <div class="err-dot"></div>
      <div class="err-dot"></div>
      <div class="err-dot"></div>
    </div>
  </div>

  <script src="/static/js/i18n.js?v=2"></script>
  <script src="/static/js/api.js?v=2"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { initNavbar(); });</script>
</body>
</html>
