<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tourist — Explore the City</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .object-list-item {
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background 0.15s;
    }
    .object-list-item:hover { background: var(--bg-card); }
    .object-list-item strong { font-size: 13px; display: block; margin-bottom: 2px; }
    .object-list-item p { font-size: 12px; color: var(--text-muted); margin: 0; }
    .chat-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .chat-tab {
      flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .chat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #objects-tab { overflow-y: auto; padding: 8px; }
    .map-wrapper { position: relative; flex: 1; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="navbar-brand"><span>🌍</span> AI Tourist</a>
    <div class="navbar-links" id="nav-auth"></div>
  </nav>

  <div class="app-layout">

    <div class="map-wrapper">
      <div id="map"></div>

      <!-- POI category filter bar -->
      <div class="poi-filter-bar" id="poi-filter-bar">
        <button class="poi-filter-btn active" data-cat="" onclick="filterPOI(this,'')">🗺️ All</button>
        <button class="poi-filter-btn" data-cat="food"          onclick="filterPOI(this,'food')">🍽️ Food</button>
        <button class="poi-filter-btn" data-cat="sights"        onclick="filterPOI(this,'sights')">🏛️ Sights</button>
        <button class="poi-filter-btn" data-cat="shopping"      onclick="filterPOI(this,'shopping')">🛍️ Shopping</button>
        <button class="poi-filter-btn" data-cat="hotels"   onclick="filterPOI(this,'hotels')">🏨 Hotels</button>
      </div>

      <!-- POI sub-filter bar (food types / distance) — shown contextually -->
      <div class="poi-sub-bar" id="poi-sub-bar" style="display:none;"></div>

      <!-- Smart info button -->
      <div class="map-info-btn" id="map-info-btn" onclick="toggleInfoSheet()" role="button" tabindex="0">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="#60a5fa" stroke-width="1.8"/>
          <circle cx="12" cy="8" r="1.3" fill="#60a5fa"/>
          <line x1="12" y1="12" x2="12" y2="17" stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="map-controls">
        <button class="map-btn" onclick="locateUser()" data-i18n="btn_my_location"></button>
        <button class="map-btn" onclick="loadObjectMarkers()" data-i18n="btn_reload"></button>
      </div>

      <div class="info-panel" id="info-panel" style="display:none;">
        <button class="info-panel-close" onclick="hideInfoPanel()">✕</button>
        <h4 id="info-name"></h4>
        <p id="info-desc" style="white-space:pre-line;"></p>
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">📍 <span id="info-location"></span></p>
        <button class="btn btn-primary btn-sm" id="ask-ai-btn" data-i18n="btn_ask_ai"></button>
      </div>

      <!-- Info modal -->
      <div class="info-modal-overlay" id="info-sheet-backdrop" onclick="toggleInfoSheet()"></div>
      <div class="info-modal" id="info-sheet">
        <div class="info-modal-close" onclick="toggleInfoSheet()" role="button" tabindex="0">✕</div>
        <div class="info-modal-icon" id="info-modal-flag">🌍</div>
        <h3 class="info-modal-title" id="info-modal-country">AI Tourist</h3>
        <div class="info-modal-divider"></div>
        <div class="info-modal-body" id="info-modal-body">
          <p style="color:var(--text-muted);text-align:center;padding:12px 0;">
            📍 Detecting your location…
          </p>
        </div>
      </div>
    </div>

    <div class="chat-panel">

      <div class="chat-tabs">
        <div class="chat-tab active" id="tab-chat"   onclick="switchTab('chat')"   data-i18n="tab_chat"></div>
        <div class="chat-tab"        id="tab-places" onclick="switchTab('places')" data-i18n="tab_nearby"></div>
        <div class="chat-tab"        id="tab-live"   onclick="switchTab('live')"   data-i18n="tab_live"></div>
      </div>

      <div class="tab-panel active" id="panel-chat">
        <div class="chat-header">
          <h3 id="chat-title" data-i18n="chat_panel_title"></h3>
          <button class="btn btn-ghost btn-sm" id="new-chat-btn" data-i18n="btn_new_chat"></button>
        </div>

        <div class="chat-messages" id="chat-messages">
          <div class="chat-empty">
            <div class="icon">🤖</div>
            <h4 data-i18n="chat_empty_title"></h4>
            <p data-i18n="chat_empty_desc"></p>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="location-bar">
            <div class="dot" id="location-dot"></div>
            <span id="location-text" data-i18n="detecting_location"></span>
          </div>
          <input type="file" id="image-input" accept="image/*" style="display:none;">
          <div class="chat-input-row">
            <div class="voice-wrap" id="voice-wrap" style="display:none;">
              <button class="voice-btn" id="voice-btn" title="Voice input">🎤</button>
              <select id="voice-lang" class="voice-lang-select">
                <option value="auto">🌐</option>
                <option value="en-US">EN</option>
                <option value="lv-LV">LV</option>
                <option value="ru-RU">RU</option>
              </select>
            </div>
            <button class="voice-btn" id="image-btn" title="Send image">📷</button>
            <textarea id="chat-input" data-i18n-placeholder="chat_placeholder" rows="1"></textarea>
            <button class="send-btn" id="send-btn">➤</button>
          </div>
        </div>
      </div>

      <div class="tab-panel" id="panel-places">
        <div class="chat-header">
          <h3 data-i18n="nearby_title"></h3>
        </div>
        <div id="objects-tab" style="overflow-y:auto;flex:1;"></div>
      </div>

      <!-- Live AI tab -->
      <div class="tab-panel" id="panel-live">
        <div class="live-panel">

          <!-- Status bar -->
          <div class="live-status-bar">
            <div class="live-dot idle" id="live-dot"></div>
            <span class="live-status-label" id="live-status-label" data-i18n="live_status_idle"></span>
          </div>

          <!-- Conversation history -->
          <div class="live-messages chat-messages" id="live-messages"></div>

          <!-- No browser support notice -->
          <div id="live-no-support" class="live-no-support" style="display:none;">
            <div style="font-size:36px;">⚠️</div>
            <p data-i18n="live_no_support"></p>
          </div>

          <!-- Live speech bubble — appears as user speaks, in real time -->
          <div class="live-bubble-area" id="live-bubble-area" style="display:none;">
            <div class="live-bubble">
              <span id="live-bubble-text"></span><span class="live-cursor" id="live-cursor">|</span>
            </div>
          </div>

          <!-- Controls -->
          <div class="live-bottom" id="live-ready">
            <div style="display:flex;flex-direction:column;gap:5px;flex:1;">
              <select id="live-lang-sel" class="live-lang-sel">
                <option value="en-US">🇬🇧 English</option>
                <option value="lv-LV">🇱🇻 Latviešu</option>
                <option value="ru-RU">🇷🇺 Русский</option>
              </select>
              <select id="live-voice-sel" class="live-lang-sel">
                <option value="nova">🔊 Nova ♀</option>
                <option value="alloy">🔊 Alloy</option>
                <option value="echo">🔊 Echo ♂</option>
                <option value="fable">🔊 Fable ♀</option>
                <option value="onyx">🔊 Onyx ♂</option>
                <option value="shimmer">🔊 Shimmer ♀</option>
              </select>
            </div>

            <button id="live-start-btn" class="live-start-btn" title="Start conversation">🎤</button>

            <button id="live-skip-btn" class="live-mute-btn" title="Skip AI speech" style="display:none;">⏭</button>
          </div>

        </div>
      </div>

    </div>
  </div>

  <div id="no-auth-overlay" class="no-auth" style="display:none;">
    <div style="font-size:56px;">🌍</div>
    <h2 data-i18n="noauth_heading"></h2>
    <p data-i18n="noauth_sub"></p>
    <div style="display:flex;gap:12px;margin-top:8px;">
      <a href="/login.html" class="btn btn-primary" data-i18n="nav_signin"></a>
      <a href="/register.html" class="btn btn-ghost" data-i18n="nav_register"></a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script>marked.use({ breaks: true, gfm: true });</script>
  <script src="/static/js/i18n.js?v=2"></script>
  <script src="/static/js/api.js?v=2"></script>
  <script src="/static/js/chat.js?v=9"></script>
  <script src="/static/js/live.js?v=6"></script>
  <script src="/static/js/map.js?v=13"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      applyTranslations();
      initNavbar();

      if (!api.isLoggedIn()) {
        document.getElementById('no-auth-overlay').style.display = 'flex';
        initMap();
        return;
      }

      initMap();
      initChat();
      initLiveAI();
    });

    function toggleInfoSheet() {
      const open = document.getElementById('info-sheet').classList.toggle('open');
      document.getElementById('info-sheet-backdrop').classList.toggle('open', open);
    }

    function switchTab(tab) {
      // Stop camera if leaving live tab
      const wasLive = document.getElementById('panel-live')?.classList.contains('active');
      if (wasLive && tab !== 'live') onLiveTabLeave?.();

      document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
    }
  </script>
</body>
</html>
