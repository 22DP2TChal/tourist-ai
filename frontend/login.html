<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AI Tourist</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .input-error { border-color: #ef4444 !important; }
    .field-error { color: #ef4444; font-size: 12px; margin-top: 4px; display: none; }
    .field-error.show { display: block; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }
    .lang-switcher-auth {
      display: flex; gap: 4px; justify-content: center; margin-bottom: 20px;
    }
    .lang-btn-auth {
      padding: 4px 14px; border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--text-muted); font-size: 12px;
      font-weight: 600; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
    }
    .lang-btn-auth:hover { color: var(--text); }
    .lang-btn-auth.lang-btn-active { background: var(--accent); color: white; border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>🌍 AI Tourist</h1>
      <p class="subtitle" data-i18n="login_subtitle"></p>

      <div class="lang-switcher-auth">
        <button class="lang-btn-auth lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn-auth lang-btn" data-lang="lv" onclick="setLang('lv')">LV</button>
      </div>

      <div id="alert" class="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="epasts" data-i18n="label_email"></label>
          <input type="email" id="epasts" data-i18n-placeholder="label_email" autocomplete="email">
          <div class="field-error" id="epasts-error"></div>
        </div>
        <div class="form-group">
          <label for="parole" data-i18n="label_password"></label>
          <input type="password" id="parole" placeholder="••••••••" autocomplete="current-password">
          <div class="field-error" id="parole-error"></div>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn" data-i18n="btn_signin"></button>
      </form>

      <div class="auth-link">
        <span data-i18n="link_no_account"></span>
        <a href="/register.html" data-i18n="nav_register"></a>
      </div>
    </div>
  </div>

  <script src="/static/js/i18n.js?v=2"></script>
  <script src="/static/js/api.js?v=2"></script>
  <script>
    if (api.isLoggedIn()) window.location.href = '/';

    // Apply translations on load
    applyTranslations();
    updateLangSwitcher();

    // Re-apply when language changes
    const _origSetLang = setLang;
    window.setLang = function(lang) {
      _origSetLang(lang);
      // Also re-sync active state on auth-specific buttons
      document.querySelectorAll('.lang-btn-auth').forEach(b => {
        b.classList.toggle('lang-btn-active', b.dataset.lang === lang);
      });
    };

    const form       = document.getElementById('login-form');
    const emailInput = document.getElementById('epasts');
    const passInput  = document.getElementById('parole');
    const alertEl    = document.getElementById('alert');

    function clearErrors() {
      alertEl.className = 'alert';
      emailInput.classList.remove('input-error');
      passInput.classList.remove('input-error');
      document.getElementById('epasts-error').classList.remove('show');
      document.getElementById('parole-error').classList.remove('show');
    }

    function setFieldError(inputEl, errorId, msgKey) {
      inputEl.classList.add('input-error');
      const el = document.getElementById(errorId);
      el.textContent = t(msgKey);
      el.classList.add('show');
    }

    function shakeCard() {
      const card = document.querySelector('.auth-card');
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
    }

    emailInput.addEventListener('input', () => {
      emailInput.classList.remove('input-error');
      document.getElementById('epasts-error').classList.remove('show');
      alertEl.className = 'alert';
    });
    passInput.addEventListener('input', () => {
      passInput.classList.remove('input-error');
      document.getElementById('parole-error').classList.remove('show');
      alertEl.className = 'alert';
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      clearErrors();

      const email    = emailInput.value.trim();
      const password = passInput.value;

      let hasError = false;
      if (!email) {
        setFieldError(emailInput, 'epasts-error', 'err_email_required');
        hasError = true;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError(emailInput, 'epasts-error', 'err_email_invalid');
        hasError = true;
      }
      if (!password) {
        setFieldError(passInput, 'parole-error', 'err_password_required');
        hasError = true;
      }
      if (hasError) { shakeCard(); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = t('btn_signing_in');

      try {
        await api.login(email, password);
        window.location.href = '/';
      } catch (err) {
        shakeCard();
        showAlert(alertEl, t('err_bad_credentials'));
        setFieldError(emailInput, 'epasts-error', 'err_check_email');
        setFieldError(passInput,  'parole-error',  'err_check_password');
        passInput.value = '';
        passInput.focus();
        btn.disabled = false;
        btn.textContent = t('btn_signin');
      }
    });
  </script>
</body>
</html>
