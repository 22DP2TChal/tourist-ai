<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — AI Tourist</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .lang-switcher-auth {
      display: flex; gap: 4px; justify-content: center; margin-bottom: 20px;
    }
    .lang-btn-auth {
      padding: 4px 14px; border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--text-muted); font-size: 12px;
      font-weight: 600; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
    }
    .lang-btn-auth:hover { color: var(--text); }
    .lang-btn-auth.lang-btn-active { background: var(--accent); color: white; border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>🌍 AI Tourist</h1>
      <p class="subtitle" data-i18n="register_subtitle"></p>

      <div class="lang-switcher-auth">
        <button class="lang-btn-auth lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn-auth lang-btn" data-lang="lv" onclick="setLang('lv')">LV</button>
      </div>

      <div id="alert" class="alert"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="epasts" data-i18n="label_email"></label>
          <input type="email" id="epasts" data-i18n-placeholder="label_email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="parole" data-i18n="label_password_hint"></label>
          <input type="password" id="parole" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn" data-i18n="btn_create"></button>
      </form>

      <div class="auth-link">
        <span data-i18n="link_have_account"></span>
        <a href="/login.html" data-i18n="nav_signin"></a>
      </div>
    </div>
  </div>

  <script src="/static/js/i18n.js?v=2"></script>
  <script src="/static/js/api.js?v=2"></script>
  <script>
    if (api.isLoggedIn()) window.location.href = '/';

    applyTranslations();
    updateLangSwitcher();

    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn     = document.getElementById('submit-btn');
      const alertEl = document.getElementById('alert');

      btn.disabled = true;
      btn.textContent = t('btn_creating');

      try {
        await api.post('/api/auth/register', {
          epasts: document.getElementById('epasts').value,
          parole: document.getElementById('parole').value,
          valoda: getLang(),
        });
        showAlert(alertEl, t('register_success'), 'success');
        await api.login(
          document.getElementById('epasts').value,
          document.getElementById('parole').value
        );
        window.location.href = '/';
      } catch (err) {
        const msg = (err.message || '').toLowerCase();
        if (msg.includes('already registered') || msg.includes('already exists')) {
          showAlert(alertEl, t('err_email_taken'));
        } else if (msg.includes('8 characters') || msg.includes('password')) {
          showAlert(alertEl, t('err_password_short'));
        } else {
          showAlert(alertEl, err.message || t('err_generic'));
        }
        btn.disabled = false;
        btn.textContent = t('btn_create');
      }
    });
  </script>
</body>
</html>
